name = "mycash-api-preview"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[vars]
# JWT_SECRET = ""
# HASHIDS_SALT = ""
# S3_ENDPOINT = ""
# S3_ACCESS_KEY = ""
# S3_SECRET_KEY = ""
# S3_BUCKET = ""
# S3_REGION = "auto"
# TURNSTILE_SECRET_KEY = ""
APP_URL = "https://mycash-preview.page.dev"
EMAIL_DRIVER = "smtp"
ENVIRONMENT = "preview"
# EMAIL_SMTP_HOST = ""
# EMAIL_SMTP_PORT = "2525"
# EMAIL_SMTP_USER = ""
# EMAIL_SMTP_PASS = ""
# EMAIL_SMTP_SECURE = "false"
# EMAIL_API_KEY = ""
# EMAIL_FROM_ADDRESS = ""
# EMAIL_FROM_NAME = ""

[[d1_databases]]
binding = "DB"
database_name = "mycash-dev"
database_id = "9a113b6b-f8cd-4a8c-9f4b-f8bf340dd832"
migrations_dir = "../../packages/database/drizzle"

[triggers]
crons = ["0 11 * * *"]

[env.production]
name = "mycash-api"

[env.production.vars]
APP_URL = "https://mycash.meira.net"
ENVIRONMENT = "production"
# TURNSTILE_SECRET_KEY = ""

[[env.production.d1_databases]]
binding = "DB"
database_name = "mycash-prod"
database_id = "17269bf5-6f44-4e15-bfca-5fcead5fc147"
migrations_dir = "../../packages/database/drizzle"

[env.production.triggers]
crons = ["0 11 * * *"]
